<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>CGV로 이동</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  body { font-family: -apple-system, system-ui, sans-serif; padding: 2em; line-height: 1.6; color: #222; max-width: 480px; margin: 0 auto; }
  .btn { display: block; padding: 14px 20px; margin: 12px 0; border-radius: 8px; text-align: center; text-decoration: none; font-weight: 600; }
  .btn-app { background: #e6002d; color: #fff; }
  .btn-web { background: #eee; color: #222; }
  .hint { color: #666; font-size: 0.9em; }
</style>
</head>
<body>
<h3>CGV 이동 <span style="font-size:0.6em;color:#999">v3</span></h3>
<a id="appBtn" class="btn btn-app" style="display:none">📱 CGV 앱에서 열기</a>
<a id="webBtn" class="btn btn-web">🌐 웹에서 열기</a>
<p class="hint">Android는 앱 버튼, iOS/PC는 웹 버튼을 탭하세요. 앱으로 열면 로그인/좌석 선택이 훨씬 원활합니다.</p>
<script>
(function () {
  var u = new URLSearchParams(location.search).get('u');
  if (!u) { document.body.textContent = '링크 오류: u 파라미터 없음'; return; }
  var hostPath = u.split('://')[1] || '';
  var intentUrl = 'intent://' + hostPath
    + '#Intent;scheme=https;package=co.kr.cgv.cjcgv;'
    + 'S.browser_fallback_url=' + encodeURIComponent(u) + ';end';
  document.getElementById('webBtn').href = u;
  document.getElementById('appBtn').href = intentUrl;
  if (/Android/i.test(navigator.userAgent)) {
    document.getElementById('appBtn').style.display = '';
  }
})();
</script>
</body>
</html>
