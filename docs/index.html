<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>CGV로 이동</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  body { font-family: -apple-system, system-ui, sans-serif; padding: 2em; line-height: 1.6; color: #222; max-width: 480px; margin: 0 auto; }
  .btn { display: block; padding: 14px 20px; margin: 12px 0; border-radius: 8px; text-align: center; text-decoration: none; background: #e6002d; color: #fff; font-weight: 600; }
  .hint { color: #666; font-size: 0.9em; }
</style>
</head>
<body>
<h3>CGV로 이동 중... <span style="font-size:0.6em;color:#999">v4</span></h3>
<a id="webBtn" class="btn">🌐 수동으로 열기</a>
<p class="hint">자동 이동이 안 되면 위 버튼을 탭하세요.</p>
<script>
(function () {
  var u = new URLSearchParams(location.search).get('u');
  if (!u) { document.body.textContent = '링크 오류: u 파라미터 없음'; return; }
  document.getElementById('webBtn').href = u;
  var target = u;
  if (/Android/i.test(navigator.userAgent)) {
    var hostPath = u.split('://')[1] || '';
    target = 'intent://' + hostPath
      + '#Intent;scheme=https;package=co.kr.cgv.cjcgv;'
      + 'S.browser_fallback_url=' + encodeURIComponent(u) + ';end';
  }
  setTimeout(function () { location.replace(target); }, 300);
})();
</script>
</body>
</html>
