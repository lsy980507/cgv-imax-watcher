name: CGV IMAX Watcher

on:
  repository_dispatch:
    types: [poll]
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # 외부 cron 장애 시 백업. GH는 이것도 제대로 안 지킴

concurrency:
  group: watcher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python poll.py

      - name: Commit state if changed
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update IMAX state [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push rejected, pulling & retrying ($i/5)"
            git pull --rebase origin main || true
            sleep 2
          done
          echo "::warning::state push failed after 5 retries (기능엔 영향 없음, 다음 run이 재시도)"
